<div class="container">
  <p *ngIf="carregando">Carregando jogo...</p>

  <div class="card aposta-card" *ngIf="!carregando && jogo">
    <h1>Fazer aposta</h1>

    <div class="confronto">
      <div class="time">
        <span class="sigla">{{ jogo.timeCasa.sigla }}</span>
        <span class="nome">{{ jogo.timeCasa.nome }}</span>
      </div>
      <span class="vs">vs</span>
      <div class="time">
        <span class="sigla">{{ jogo.timeFora.sigla }}</span>
        <span class="nome">{{ jogo.timeFora.nome }}</span>
      </div>
    </div>

    <p class="detalhes">
      {{ jogo.dataHora | date: 'dd/MM/yyyy HH:mm' }} &middot; {{ jogo.estadio }} &middot; Fase: {{ jogo.fase }}
    </p>

    <div class="alert alert-erro" *ngIf="mensagemErro">{{ mensagemErro }}</div>
    <div class="alert alert-sucesso" *ngIf="mensagemSucesso">{{ mensagemSucesso }}</div>

    <form [formGroup]="formulario" (ngSubmit)="apostar()">
      <div class="palpite-grupo">
        <div class="form-group">
          <label for="palpiteGolsCasa">Gols {{ jogo.timeCasa.sigla }}</label>
          <input id="palpiteGolsCasa" type="number" min="0" formControlName="palpiteGolsCasa" />
        </div>

        <div class="form-group">
          <label for="palpiteGolsFora">Gols {{ jogo.timeFora.sigla }}</label>
          <input id="palpiteGolsFora" type="number" min="0" formControlName="palpiteGolsFora" />
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="enviando">
        {{ enviando ? 'Enviando...' : 'Confirmar aposta' }}
      </button>
    </form>
  </div>
</div>
